name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch:      # Manual trigger

jobs:
  ai-inspect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot
          # Authenticate using the secret you set up
          echo "${{ secrets.COPILOT_TOKEN }}" | gh auth login --with-token
          
      - name: Copilot Forensic Scan
        id: scanner
        env:
          # In 2026, COPILOT_GITHUB_TOKEN is the required variable for CLI Agents
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="https://enablesmartspirit.blogspot.com/"
          
          # Use -p for the prompt and --allow-all to bypass interactive tool approvals
          # The -s flag makes the output "Silent" (no extra AI fluff, just the data)
          REPORT=$(copilot -p "Analyze the source code of $TARGET. Is the 'AGC CSR' script present? What is the version? If the site is a 404, respond ONLY with 'DELETED'." --allow-all -s)
          
          echo "REPORT_DATA<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

     
      - name: Log Findings to Private Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$REPORT_DATA" == *"404"* ]]; then
            gh issue create --title "🎉 Hooray: This domain does not exist." \
              --body "Copilot reports that $TARGET is no longer reachable. Investigation complete." \
              --label "neutralized"
          else
            gh issue create --title "⚠️ Warning: This domain exists and do not click it." \
              --body "### Copilot Forensic Report
              **Target:** enablesmartspirit.blogspot.com
              **Analysis:** $REPORT_DATA
              
              *Automated log created via GitHub Copilot CLI.*" \
              --label "threat-detected"
          fi
