name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch:      # Manual trigger

jobs:
  ai-inspect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Install Copilot CLI
        run: |
          # 2026 Installation Method
          npm install -g @github/copilot
          
      - name: Authenticate Agent
        env:
          # Use your PAT stored in Secrets
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          # Force the CLI to store the session locally in the runner
          echo "$COPILOT_TOKEN" | copilot auth login --with-token

      - name: Copilot Forensic Scan
        id: scanner
        env:
          # Required for 2026 Agentic Web Fetching
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="https://enablesmartspirit.blogspot.com/"
          
          # 2026 AUTOPILOT COMMAND:
          # --autopilot: Runs the task end-to-end without asking for approval
          # --allow-all-tools: Gives permission to use the web-fetcher tool
          # --quiet: Ensures only the data is returned, no AI chatter
          
          REPORT=$(copilot -p "Analyze the source code of $TARGET. Is the 'AGC CSR' script present? What is the version? If the site is a 404, respond ONLY with '404'." --autopilot --allow-all-tools --quiet)
          
          # Save to environment using HEREDOC to prevent shell injection errors
          echo "REPORT_DATA<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Log Findings to Private Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="enablesmartspirit.blogspot.com"
          
          # Check if the AI returned a 404/Deleted status
          if [[ "$REPORT_DATA" == *"404"* ]]; then
            gh issue create --title "🎉 Hooray: Bot Node Neutralized" \
              --body "Copilot reports that $TARGET is no longer reachable. The 'Notice Detected' loop is officially gone." \
              --label "neutralized"
          else
            gh issue create --title "⚠️ Warning: Bot Node Still Active" \
              --body "### AI Forensic Report
              **Target:** $TARGET
              **Analysis:** $REPORT_DATA
              
              *Automated log created via GitHub Copilot CLI Agent.*" \
              --label "threat-detected"
          fi
