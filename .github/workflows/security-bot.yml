name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  inspect-without-ai:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Forensic Web Grab
        id: grab
        run: |
          TARGET="https://enablesmartspirit.blogspot.com/"
          # Grab the site content. -f fails on 404, -L follows redirects.
          curl -s -L -f "$TARGET" > site_source.txt || echo "OFFLINE" > site_source.txt
          
          if grep -q "OFFLINE" site_source.txt; then
            echo "RESULT=404" >> $GITHUB_ENV
          elif grep -q "AGC CSR" site_source.txt; then
            echo "RESULT=DETECTED" >> $GITHUB_ENV
          else
            echo "RESULT=CLEAN" >> $GITHUB_ENV
          fi

      - name: Log Findings
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: "DeveloperTryingToCodeLikeOtherOfThem/workflow-testing"
        run: |
          if [[ "$RESULT" == "404" ]]; then
            gh issue create --repo "$REPO" \
              --title "🎉 Node Neutralized" \
              --body "The site is officially 404 or Offline. No AI quota used." \
              --label "neutralized"
          elif [[ "$RESULT" == "DETECTED" ]]; then
            gh issue create --repo "$REPO" \
              --title "⚠️ Warning: AGC CSR Detected" \
              --body "The malicious script was found in the source code of $TARGET." \
              --label "threat-detected"
          else
            gh issue create --repo "$REPO" \
              --title "🔍 Scan Clean" \
              --body "Site is up, but 'AGC CSR' was not found in this scan." \
              --label "monitored"
          fi
