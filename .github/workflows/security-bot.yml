name: AI Bot Investigation
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ai-inspect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
          
      - name: Copilot Forensic Scan
        id: scanner
        env:
          # Official 2026 Auth: CLI looks for this variable first
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TARGET="https://enablesmartspirit.blogspot.com/"
          
          # 2026 UPDATED FLAGS:
          # --mode autopilot: Replaces --yes and --one-shot for automation.
          # --silent: Removes progress spinners that break shell variables.
          # -p: Your investigation prompt.
          
          REPORT=$(copilot -p "Analyze $TARGET. Is 'AGC CSR' present? If 404, say '404'." --mode autopilot --silent)
          
          echo "REPORT_DATA<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Log Findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: "DeveloperTryingToCodeLikeOtherOfThem/workflow-testing"
        run: |
          # Logic check: if AI output contains '404' or is empty (due to blocks)
          if [[ "$REPORT_DATA" == *"404"* ]] || [[ -z "$REPORT_DATA" ]]; then
            gh issue create --repo "$REPO" \
              --title "🎉 Hooray: Node Neutralized" \
              --body "The site is dead or unreachable. Check logs if this was unexpected." \
              --label "neutralized"
          else
            gh issue create --repo "$REPO" \
              --title "⚠️ Warning: Node Active" \
              --body "### Forensic Report\n$REPORT_DATA" \
              --label "threat-detected"
          fi
